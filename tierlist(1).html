<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>music tier list</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      padding: 32px 24px 64px;
    }

    .wrap { max-width: 760px; margin: 0 auto; }

    h1 { font-size: 24px; font-weight: 600; color: #f0f6fc; margin-bottom: 20px; }

    .note {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 6px; padding: 12px 16px; margin-bottom: 24px;
      font-size: 13px; color: #8b949e; line-height: 1.6;
    }

    /* Table */
    table { width: 100%; border-collapse: collapse; border: 1px solid #30363d; border-radius: 6px; overflow: hidden; margin-bottom: 20px; }
    thead th { background: #161b22; color: #8b949e; font-weight: 600; font-size: 13px; padding: 10px 16px; text-align: center; border-bottom: 1px solid #30363d; }
    thead th:first-child { text-align: left; width: 80px; }
    tbody tr { border-bottom: 1px solid #21262d; }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 12px 16px; vertical-align: middle; }
    td:first-child { font-weight: 700; font-size: 18px; border-right: 1px solid #21262d; text-align: center; width: 80px; white-space: nowrap; }
    td:last-child { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; min-height: 44px; }

    /* Tier letter colors — light green to dark sage */
    .tier-s { color: #d4f1d4; }
    .tier-a { color: #b5deb5; }
    .tier-b { color: #8fc28f; }
    .tier-c { color: #6aa66a; }
    .tier-d { color: #4e8b5f; }
    .tier-f { color: #3a6b4a; }

    /* Badges — sage green palette */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 4px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.03em;
      white-space: nowrap; cursor: default;
    }

    /* Badge shades: light mint → deep sage */
    .col-0  { background: #c8e6c8; color: #2d4f2d; }
    .col-1  { background: #b2d9b2; color: #2a4a2a; }
    .col-2  { background: #9dcc9d; color: #274427; }
    .col-3  { background: #88bf88; color: #243d24; }
    .col-4  { background: #73b273; color: #213721; }
    .col-5  { background: #5e9e6e; color: #1e301e; }
    .col-6  { background: #4e8b5f; color: #dff0df; }
    .col-7  { background: #3e7850; color: #dff0df; }
    .col-8  { background: #2f6642; color: #d4ecd4; }
    .col-9  { background: #205434; color: #c8e6c8; }
    .col-10 { background: #a8cca8; color: #243d24; }
    .col-11 { background: #7ab87a; color: #1e301e; }

    .empty-cell { color: #484f58; font-style: italic; font-size: 13px; }

    footer { color: #484f58; font-size: 12px; margin-top: 32px; }
    footer a { color: #8fc28f; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="wrap">

  <h1>music tier list</h1>

  <div class="note">Just my opinions :)</div>

  <table>
    <thead><tr><th>tier</th><th>genre(s)</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>

  <footer>
    <a href="https://github.com/SxkulSpace">&#8592; back to profile</a>
  </footer>

</div>
<script>
localStorage.removeItem('music-tl-v5');

const TIER_CLASS = { S:'tier-s', A:'tier-a', B:'tier-b', C:'tier-c', D:'tier-d', F:'tier-f' };

const DEFAULTS = [
  { tier: 'S', genres: ['Jazz Rap', 'Corridos Tumbados', 'R&B', 'Classical', 'Japanese Acid Jazz', 'Mongolian Throat Singing', 'Cumbia', 'Russian Drill (when done well)',  ] },
  { tier: 'A', genres: ['Breakcore', 'Soul', 'Jungle', 'Video Game Soundtracks', 'Turkish Rap', 'Trap', 'Classic House', 'Urbano Latino', 'Anime Rock',   ] },
  { tier: 'B', genres: ['Hip Hop', 'Classic Rock', 'Jersey Club', 'Digicore', 'Techno'] },
  { tier: 'C', genres: ['Pop'] },
  { tier: 'D', genres: ['Country', 'Metal', 'Eurobeat',  ] },
  { tier: 'F', genres: ['Anything to do with Yodeling', 'Anything to do with Phonk', ] },
];

let tiers = JSON.parse(JSON.stringify(DEFAULTS));

const colorMap = {};
let colorCounter = 0;
function getColor(genre) {
  const key = genre.toLowerCase();
  if (colorMap[key] === undefined) { colorMap[key] = colorCounter % 12; colorCounter++; }
  return colorMap[key];
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  tiers.forEach((row, ti) => {
    const tr = document.createElement('tr');

    const tierTd = document.createElement('td');
    const lbl = document.createElement('span');
    lbl.className = TIER_CLASS[row.tier] || '';
    lbl.textContent = row.tier;
    tierTd.appendChild(lbl);
    tr.appendChild(tierTd);

    const genreTd = document.createElement('td');
    if (!row.genres.length) {
      const em = document.createElement('span');
      em.className = 'empty-cell';
      em.textContent = 'nothing here yet';
      genreTd.appendChild(em);
    } else {
      row.genres.forEach((g, gi) => {
        const badge = document.createElement('span');
        badge.className = `badge col-${getColor(g)}`;
        badge.innerHTML = esc(g);
        genreTd.appendChild(badge);
      });
    }
    tr.appendChild(genreTd);
    tbody.appendChild(tr);
  });
}

render();
</script>
</body>
</html>
